# Synthetic GMRT-frequency RM-synthesis validation cube

path=/home/wasim/softwares/rmtool/scratch/sim_gmrt_rm/
infileQ=SIM_GMRT.Q.FITSCUBE
infileU=SIM_GMRT.U.FITSCUBE
outfile=SIM_GMRT_RMSYNTH_FULLIM

remove_badchan=n
global_badchan_file=unused_badchan.txt

# Optional mask controls:
# mask_input_cube_file: input frequency-mask cube (0=bad, >0 good).
# mask_cube_file: override output mask filename (default: <outfile>.MASK.CUBE.FITS).
# mask_trust_mode: safe|strict. safe keeps NaN checks enabled.
mask_input_cube_file=
mask_cube_file=
mask_trust_mode=safe
write_mask_output=y
write_nvalid_output=y

subim=n
subim_ra_blc=1
subim_ra_trc=0
subim_ra_inc=1
subim_dec_blc=1
subim_dec_trc=0
subim_dec_inc=1
subim_chan_blc=1
subim_chan_trc=0
subim_chan_inc=1

tile_auto=y
tile_ra=0
tile_dec=0
tile_mem_frac=0.25
dry_run=y

rem_mean=0
remove_qu_bias=n
resiQ=0.0
slopeQ=0.0
resiU=0.0
slopeU=0.0

path_I=/home/wasim/softwares/rmtool/scratch/sim_gmrt_rm/
infileI=SIM_GMRT.I.FITSCUBE

ofac=4
fac=3.14159265358979
use_auto_rm_range=0
output_mode=ap
ap_angle_mode=phase
beg_rm=-200.0
end_rm=200.0
nrm=201