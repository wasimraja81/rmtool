# Generic reproject_cubes.cfg template.
# Edit reffile/infiles for your data, then run e.g.:
#   bin/reproject_cubes --config cfg/reproject_cubes.cfg
# CLI key=value args can override individual keys from this file -- see
# below and `bin/reproject_cubes --help`. This lists every key the tool
# supports: mode/reffile/infiles are required (from this file, the CLI,
# or a mix of both); mem_frac_ram is optional.

# --- Footprint mode (required) ---
# How the output pixel grid is chosen:
#   reference    output grid is exactly the reference file's own extent
#   intersection output grid shrinks to the overlap of every input with
#                the reference (smallest common footprint)
#   union        output grid grows to cover every input and the
#                reference (largest combined footprint, NaN-filled
#                wherever a given input doesn't reach)
mode = reference

# --- Reference file (required) ---
# The cube whose WCS/grid every input is reprojected onto. Its own sky
# axis order and pixel spacing define the output grid.
reffile = /path/to/reference_band.fits

# --- Input files (required) ---
# Comma-separated list of one or more cubes to reproject onto reffile's
# grid (no spaces needed around the commas). Each is resampled
# independently and written alongside itself as
# <infile>_REPROJ.FITS -- reffile itself is not rewritten (it already
# defines the grid; in "reference" mode with reffile also listed as an
# input, the output would just reproduce the input file as-is).
infiles = /path/to/band1.fits,/path/to/band2.fits,/path/to/band3.fits

# --- Memory budget for block I/O (optional, default 0.25) ---
# Planes are read/resampled/written in blocks, not one at a time --
# same concept as rm_synthesis's own mem_frac_ram: this fraction (must
# be >0 and <=0.95) of TOTAL system RAM (not instantaneously-available
# RAM -- deterministic block size for a given cube, reproducible across
# runs) is budgeted for one block. Smaller = more, smaller blocks (less
# peak memory, more CFITSIO calls); larger = fewer, bigger blocks (one
# block can end up covering the whole cube if it comfortably fits).
# OpenMP threads only parallelise WITHIN one block, never across blocks
# (blocks run strictly one after another) -- too small a mem_frac_ram
# therefore also throws away most of the speedup, not just increases
# I/O calls (the tool prints a WARNING if this happens). Measured over
# 2x slower (not from I/O -- from lost parallelism) forcing 1 plane per
# block vs. one block covering the whole cube on a 16-thread run.
mem_frac_ram = 0.25

# --- CLI override note ---
# `reproject_cubes --config cfg/reproject_cubes.cfg` uses all the
# keys above as-is. A key=value CLI arg alongside --config overrides
# just that one key (no spaces around '='); keys not given on the CLI
# still come from this file, e.g. this overrides only mode and keeps
# reffile/infiles from the file:
#   bin/reproject_cubes --config cfg/reproject_cubes.cfg mode=intersection
# There are no positional (bare, unnamed) CLI args -- mode/reffile/
# infiles must always be named, either here or as key=value on the CLI.
