# RM-SYNTHESIS CONFIGURATION FILE
# Fully KEY=VALUE based. Order does not matter.
# Comments can use '#' or ';'.

# Input/output
path=../DATA/
infileQ=Q_CUBE.FITSCUBE
infileU=U_CUBE.FITSCUBE
outfile=output_RM_cube

# Optional data filtering
remove_badchan=y
badchan_file=bad_channels.txt
subim=y
subim_parfile=subimage_params.par

# Mean-removal and bias controls
rem_mean=0
remove_qu_bias=n
resiQ=0.001
slopeQ=0.01
resiU=0.001
slopeU=0.01

# I-cube (used when rem_mean > 0)
path_I=../DATA/
infileI=I_CUBE.FITSCUBE

# RM extraction controls
ofac=4
fac=3.14159265358979
use_auto_rm_range=1
ap_angle_mode=phase

# Used only when use_auto_rm_range=0
beg_rm=-50.0
nrm_out=100

# AUTO mode (use_auto_rm_range=1): beg_rm/nrm_out ignored.
# CUSTOM mode (use_auto_rm_range=0): linear RM grid starts at beg_rm.
