# RM-synthesis test config: full-image run
# Same limited RM settings as subimage test.
# Adjust path/infile names if your data location differs.

path=/data1/tmp/

infileQ=cutout-stokesQ.fits 
infileU=cutout-stokesU.fits 
outfile=JENNIFER_TOO_FULLIM_TEST

remove_badchan=y
global_badchan_file=/home/wasim/softwares/rmtool/cfg/askap_nan_channels.burdies

# Optional mask controls:
# mask_input_cube_file: input frequency-mask cube (0=bad, >0 good).
# mask_cube_file: override output mask filename (default: <outfile>.MASK.CUBE.FITS).
# mask_trust_mode: safe|strict. safe keeps NaN checks enabled.
mask_input_cube_file=
mask_cube_file=
mask_trust_mode=safe
write_mask_output=n
write_nvalid_output=y
cubestat=y
use_gpu=y

subim=n
subim_ra_blc=1
subim_ra_trc=0
subim_ra_inc=1
subim_dec_blc=1
subim_dec_trc=0
subim_dec_inc=1
subim_chan_blc=1
subim_chan_trc=0
subim_chan_inc=1

rem_mean=0
remove_qu_bias=n
resiQ=0.0
slopeQ=0.0
resiU=0.0
slopeU=0.0

path_I=/data1/tmp 
infileI="" 

ofac=1
fac=3.14159265358979
use_auto_rm_range=0
output_mode=ap
ap_angle_mode=phase
beg_rm=-500.0
end_rm=500.0
nrm=101
dry_run=n


tile_auto=y
tile_ra=4501
tile_dec=1315
mem_frac_ram=0.3
mem_frac_vram=0.70
gpu_vram_mib=6144
io_overlap=n