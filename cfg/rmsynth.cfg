# Generic rmsynth.cfg template.
# Edit path/infileQ/infileU/outfile for your data, then run e.g.:
#   bin/rm_synthesis_release_cpu_omp cfg/rmsynth.cfg
# See README.md's "Configuration" section for the full annotated
# reference of every key below (required/optional, defaults, meaning).

# --- Input / output paths (required) ---
path    = /path/to/data/
infileQ = Q_cube.fits
infileU = U_cube.fits
outfile = rmsynth_output

# --- Bad-channel handling (required) ---
remove_badchan = n
badchan_file   = unused.txt

# --- Subimage extraction (required: subim; rest optional, default = full cube) ---
subim = n
subim_ra_blc   = 1
subim_ra_trc   = 0
subim_ra_inc   = 1
subim_dec_blc  = 1
subim_dec_trc  = 0
subim_dec_inc  = 1
subim_chan_blc = 0
subim_chan_trc = 0
subim_chan_inc = 1

# --- Q/U processing & bias correction (required) ---
rem_mean       = 0
remove_qu_bias = n
resiQ  = 0.0
slopeQ = 0.0
resiU  = 0.0
slopeU = 0.0

# path_I/infileI (required if remove_qu_bias = y)
path_I  = /path/to/data/
infileI = I_cube.fits

# --- RM synthesis sampling (required: ofac, fac, use_auto_rm_range) ---
use_auto_rm_range = 0
ofac = 4
fac  = 3.14159265358979

# beg_rm/end_rm/nrm (required if use_auto_rm_range = 0)
beg_rm = -500
end_rm =  500
nrm    =  101

# --- Output format (optional) ---
output_mode   = ap
ap_angle_mode = phase

# --- Masking & optional outputs (optional) ---
mask_cube_file       =
mask_input_cube_file =
mask_trust_mode      = safe
write_mask_output    = y
write_nvalid_output  = y

# --- Cubestat / peak maps (optional) ---
cubestat = n

# --- GPU (optional) ---
use_gpu      = n
gpu_vram_mib = 0
mem_frac_vram = 0.70

# --- Tile memory planning & I/O parallelism (optional) ---
tile_auto        = y
tile_ra          = 0
tile_dec         = 0
mem_frac_ram     = 0.30
io_read_threads  = 1
io_write_threads = 1
io_overlap       = n

# --- Logging & timing (optional) ---
log_level            = info
log_output_file      =
timing_enabled       = y
timing_tile_enabled  = y
timing_io_enabled    = y
timing_csv_file      =

# --- Misc (optional) ---
dry_run = n
