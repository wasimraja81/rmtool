# RM-synthesis test config: subimage run
# Adjust path/infile names if your data location differs.

path=/home/wasim/softwares/CURR_DEVEL/fitsio_utils/myfitsio.1.0/DATA/
infileQ=MY_CASA.QCL001.1.FITSCUBE
infileU=MY_CASA.UCL001.1.FITSCUBE
outfile=MY_CASA_RMSYNTH_SUBIM_TEST

remove_badchan=n
global_badchan_file=unused_badchan.txt

# Optional mask controls:
# mask_input_cube_file: input frequency-mask cube (0=bad, >0 good).
# mask_cube_file: override output mask filename (default: <outfile>.MASK.CUBE.FITS).
# mask_trust_mode: safe|strict. safe keeps NaN checks enabled.
mask_input_cube_file=
mask_cube_file=
mask_trust_mode=safe
write_mask_output=y
write_nvalid_output=y
use_gpu=y

subim=y
subim_ra_blc=1
subim_ra_trc=10
subim_ra_inc=1
subim_dec_blc=1
subim_dec_trc=10
subim_dec_inc=1
subim_chan_blc=0
subim_chan_trc=0
subim_chan_inc=1

tile_auto=y
tile_ra=0
tile_dec=0
mem_frac_ram=0.25
mem_frac_vram=0.70
gpu_vram_mib=0
io_overlap=n
dry_run=n

rem_mean=0
remove_qu_bias=n
resiQ=0.0
slopeQ=0.0
resiU=0.0
slopeU=0.0

path_I=/home/wasim/softwares/CURR_DEVEL/fitsio_utils/myfitsio.1.0/DATA/
infileI=MY_CASA.ICL001.1.RLCOR.FITSCUBE.MEAN.FITS

ofac=4
fac=3.14159265358979
use_auto_rm_range=0
output_mode=ap
ap_angle_mode=phase
beg_rm=-100.0
end_rm=100.0
nrm=20
